{% extends "base.html" %}
{% block title %}세션 목록 - BOJ 출석 체커{% endblock %}

{% block content %}
<h2 class="mb-4">세션 목록</h2>
<div id="session-list" class="row g-3">
  <div class="col-12 text-muted">불러오는 중...</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const TYPE_COLORS = {
  "겨울방학": "primary",
  "1학기":   "success",
  "여름방학": "warning",
  "2학기":   "danger",
};

async function loadSessions() {
  const res = await fetch('/api/v1/public/sessions');
  const sessions = await res.json();
  const container = document.getElementById('session-list');

  if (!sessions.length) {
    container.innerHTML = '<div class="col-12 text-muted">등록된 세션이 없습니다.</div>';
    return;
  }

  container.innerHTML = sessions.map(s => {
    const color = TYPE_COLORS[s.type] || 'secondary';
    return `
      <div class="col-md-4">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <span class="badge bg-${color} mb-2">${s.type}</span>
            <h5 class="card-title">${s.name}</h5>
            <p class="card-text text-muted small">
              ${s.start_date} ~ ${s.end_date}<br>
              멤버 ${s.member_count}명 · ${s.week_count}주차
            </p>
          </div>
          <div class="card-footer bg-transparent">
            <a href="/session/${s.id}" class="btn btn-outline-primary btn-sm w-100">
              <i class="bi bi-table me-1"></i>출석 확인
            </a>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

loadSessions();
</script>
{% endblock %}
