{% extends "base.html" %}
{% block title %}출석표 - BOJ 출석 체커{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="/static/css/attendance.css">{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 id="session-title">출석표</h2>
  <a id="export-btn" href="#" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-download me-1"></i>CSV 다운로드
  </a>
</div>
<div id="attendance-wrap">
  <p class="text-muted">불러오는 중...</p>
</div>
{% endblock %}

{% block extra_js %}
<script>
const SESSION_ID = {{ session_id }};

async function load() {
  const res = await fetch(`/api/v1/public/sessions/${SESSION_ID}/attendance`);
  if (!res.ok) { document.getElementById('attendance-wrap').innerHTML = '<p class="text-danger">데이터를 불러올 수 없습니다.</p>'; return; }
  const data = await res.json();

  document.getElementById('export-btn').href = `/api/v1/public/sessions/${SESSION_ID}/attendance/export`;

  const wrap = document.getElementById('attendance-wrap');
  if (!data.rows.length) { wrap.innerHTML = '<p class="text-muted">등록된 멤버가 없습니다.</p>'; return; }

  const thead = data.weeks.map(w =>
    `<th class="text-center" title="마감: ${w.end_date}">
      Week${w.week_number}<br>
      <small class="text-muted">${w.end_date}</small>
    </th>`
  ).join('');

  const tbody = data.rows.map(row => {
    const cells = data.weeks.map(w => {
      const cell = row.weeks[w.id];
      if (!cell) return `<td class="text-center text-muted">-</td>`;
      const icon = cell.is_present
        ? `<span class="badge bg-success">O</span>`
        : `<span class="badge bg-danger">X</span>`;
      const tip = `풀이: 골드${cell.solved_gold_count}개 / 총${cell.solved_total_count}개`;
      return `<td class="text-center" title="${tip}">${icon}</td>`;
    }).join('');
    return `<tr><td>${row.member_name}</td><td class="text-muted">${row.baekjoon_handle}</td>${cells}</tr>`;
  }).join('');

  wrap.innerHTML = `
    <div class="table-responsive">
      <table class="table table-bordered table-hover attendance-table">
        <thead class="table-dark">
          <tr>
            <th>이름</th><th>BOJ ID</th>${thead}
          </tr>
        </thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`;
}

load();
</script>
{% endblock %}
