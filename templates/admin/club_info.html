{% extends "base.html" %}
{% block title %}동아리 소개 편집 — GPS 동아리{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/admin_club.css">
{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="/admin">관리자</a></li>
    <li class="breadcrumb-item active">동아리 소개 편집</li>
  </ol>
</nav>

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>동아리 소개 편집</h2>
  <button class="btn btn-primary" onclick="saveInfo()">
    <i class="bi bi-floppy me-1"></i>저장
  </button>
</div>

<div id="save-alert" class="alert d-none mb-3"></div>

<div class="row g-4">
  <div class="col-lg-6">
    <label class="form-label fw-semibold">소개글 편집</label>
    <textarea id="intro-text" class="form-control font-monospace" rows="18" placeholder="동아리 소개글을 입력하세요..."></textarea>
    <div class="form-text">줄바꿈이 그대로 표시됩니다.</div>
  </div>
  <div class="col-lg-6">
    <label class="form-label fw-semibold">미리보기</label>
    <div class="card">
      <div class="card-body">
        <pre id="preview" class="intro-text text-muted mb-0" style="min-height:200px; white-space:pre-wrap; font-family:inherit;"></pre>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function loadInfo() {
  const res = await fetch('/api/v1/club-info');
  if (res.ok) {
    const data = await res.json();
    document.getElementById('intro-text').value = data.intro_text;
    document.getElementById('preview').textContent = data.intro_text;
  }
}

document.getElementById('intro-text').addEventListener('input', function() {
  document.getElementById('preview').textContent = this.value;
});

async function saveInfo() {
  const text = document.getElementById('intro-text').value;
  const res = await fetch('/api/v1/club-info', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ intro_text: text }),
  });
  const alertEl = document.getElementById('save-alert');
  if (res.ok) {
    alertEl.className = 'alert alert-success mb-3';
    alertEl.textContent = '저장되었습니다.';
  } else {
    alertEl.className = 'alert alert-danger mb-3';
    alertEl.textContent = '저장 실패: ' + (await res.json()).detail;
  }
  alertEl.classList.remove('d-none');
  setTimeout(() => alertEl.classList.add('d-none'), 3000);
}

loadInfo();
</script>
{% endblock %}
