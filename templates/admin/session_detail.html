{% extends "base.html" %}
{% block title %}세션 관리{% endblock %}

{% block content %}
<nav aria-label="breadcrumb"><ol class="breadcrumb">
  <li class="breadcrumb-item"><a href="/admin">관리자</a></li>
  <li class="breadcrumb-item active" id="bc-name">세션</li>
</ol></nav>

<div class="row g-4">
  <!-- 멤버 관리 -->
  <div class="col-md-5">
    <div class="card shadow-sm h-100">
      <div class="card-header d-flex justify-content-between align-items-center">
        <strong>멤버 관리</strong>
        <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#addMemberModal">
          <i class="bi bi-person-plus"></i> 추가
        </button>
      </div>
      <div class="card-body p-0">
        <table class="table table-sm mb-0" id="member-table">
          <thead><tr><th>이름</th><th>BOJ ID</th><th></th></tr></thead>
          <tbody id="member-tbody"><tr><td colspan="3" class="text-muted p-3">불러오는 중...</td></tr></tbody>
        </table>
      </div>
      <div class="card-footer">
        <button class="btn btn-sm btn-outline-secondary w-100" data-bs-toggle="modal" data-bs-target="#bulkModal">
          일괄 등록 (이름,BOJ ID)
        </button>
      </div>
    </div>
  </div>

  <!-- 주차 관리 -->
  <div class="col-md-7">
    <div class="card shadow-sm h-100">
      <div class="card-header d-flex justify-content-between align-items-center">
        <strong>주차 관리</strong>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-outline-secondary" onclick="openImportModal()">
            <i class="bi bi-box-arrow-in-down"></i> 가져오기
          </button>
          <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#addWeekModal">
            <i class="bi bi-plus-circle"></i> 주차 추가
          </button>
        </div>
      </div>
      <div class="card-body p-0">
        <table class="table table-sm mb-0">
          <thead><tr><th>주차</th><th>마감일</th><th>조건</th><th></th></tr></thead>
          <tbody id="week-tbody"><tr><td colspan="4" class="text-muted p-3">불러오는 중...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add Member Modal -->
<div class="modal fade" id="addMemberModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">멤버 추가</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div class="mb-3"><label class="form-label">이름</label><input type="text" class="form-control" id="m-name" required></div>
        <div class="mb-3"><label class="form-label">백준 ID</label><input type="text" class="form-control" id="m-handle" required></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
        <button class="btn btn-primary" onclick="addMember()">추가</button>
      </div>
    </div>
  </div>
</div>

<!-- Bulk Modal -->
<div class="modal fade" id="bulkModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">일괄 등록</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <p class="text-muted small">한 줄에 하나씩 <code>이름,BOJ_ID</code> 형식으로 입력하세요.</p>
        <textarea class="form-control font-monospace" id="bulk-text" rows="8" placeholder="홍길동,gildong123
이몽룡,mongryong456"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
        <button class="btn btn-primary" onclick="bulkAdd()">등록</button>
      </div>
    </div>
  </div>
</div>

<!-- Add Week Modal -->
<div class="modal fade" id="addWeekModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">주차 추가</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div class="row mb-3">
          <div class="col"><label class="form-label">주차 번호</label><input type="number" class="form-control" id="w-num" min="1" value="1"></div>
          <div class="col"><label class="form-label">마감일</label><input type="date" class="form-control" id="w-end"></div>
        </div>
        <div class="row mb-3">
          <div class="col"><label class="form-label">골드 이상 최소</label><input type="number" class="form-control" id="w-gold" min="0" value="0"></div>
          <div class="col"><label class="form-label">총 최소 풀이 수</label><input type="number" class="form-control" id="w-total" min="0" value="1"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">조건 관계</label>
          <select class="form-select" id="w-mode">
            <option value="AND">AND (둘 다 만족)</option>
            <option value="OR">OR (하나만 만족)</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
        <button class="btn btn-primary" onclick="addWeek()">추가</button>
      </div>
    </div>
  </div>
</div>

<!-- Edit Week Modal -->
<div class="modal fade" id="editWeekModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">주차 설정 수정</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div class="row mb-3">
          <div class="col"><label class="form-label">주차 번호</label><input type="number" class="form-control" id="ew-num" min="1"></div>
          <div class="col"><label class="form-label">마감일</label><input type="date" class="form-control" id="ew-end"></div>
        </div>
        <div class="row mb-3">
          <div class="col"><label class="form-label">골드 이상 최소</label><input type="number" class="form-control" id="ew-gold" min="0"></div>
          <div class="col"><label class="form-label">총 최소 풀이 수</label><input type="number" class="form-control" id="ew-total" min="0"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">조건 관계</label>
          <select class="form-select" id="ew-mode">
            <option value="AND">AND (둘 다 만족)</option>
            <option value="OR">OR (하나만 만족)</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
        <button class="btn btn-primary" onclick="saveWeek()">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- Import Weeks Modal -->
<div class="modal fade" id="importModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-box-arrow-in-down me-2"></i>다른 세션에서 주차 가져오기</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">세션 선택</label>
          <select class="form-select" id="import-session-select" onchange="loadImportWeeks(this.value)">
            <option value="">— 세션을 선택하세요 —</option>
          </select>
        </div>
        <div id="import-weeks-section" class="d-none">
          <label class="form-label fw-semibold">가져올 주차</label>
          <div class="d-flex gap-2 mb-2">
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="toggleAllImport(true)">전체 선택</button>
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="toggleAllImport(false)">전체 해제</button>
          </div>
          <div id="import-week-list" class="border rounded p-2" style="max-height:220px;overflow-y:auto"></div>
        </div>
        <div id="import-empty" class="d-none text-muted small mt-2">이 세션에는 주차가 없습니다.</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
        <button class="btn btn-primary" id="import-btn" onclick="importWeeks()" disabled>가져오기</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const SESSION_ID = {{ session_id }};

async function loadAll() {
  const [sRes, mRes, wRes] = await Promise.all([
    fetch(`/api/v1/sessions/${SESSION_ID}`),
    fetch(`/api/v1/sessions/${SESSION_ID}/members`),
    fetch(`/api/v1/sessions/${SESSION_ID}/weeks`),
  ]);
  const s = await sRes.json();
  document.getElementById('bc-name').textContent = s.name;

  const members = await mRes.json();
  document.getElementById('member-tbody').innerHTML = members.map(m =>
    `<tr>
      <td>${m.name}</td>
      <td><a href="https://www.acmicpc.net/user/${m.baekjoon_handle}" target="_blank">${m.baekjoon_handle}</a></td>
      <td><button class="btn btn-sm btn-outline-danger py-0 px-1" onclick="deleteMember(${m.id})"><i class="bi bi-trash"></i></button></td>
    </tr>`
  ).join('') || '<tr><td colspan="3" class="text-muted p-3">멤버 없음</td></tr>';

  const weeks = await wRes.json();
  document.getElementById('week-tbody').innerHTML = weeks.map(w =>
    `<tr>
      <td>Week ${w.week_number}</td>
      <td>${w.end_date}</td>
      <td class="text-muted small">골드≥${w.min_gold_problems} ${w.criteria_mode} 총≥${w.min_total_problems}</td>
      <td class="d-flex gap-1">
        <a href="/admin/weeks/${w.id}" class="btn btn-sm btn-outline-primary py-0">문제</a>
        <button class="btn btn-sm btn-outline-secondary py-0" onclick="editWeek(${w.id},${w.week_number},'${w.end_date}',${w.min_gold_problems},${w.min_total_problems},'${w.criteria_mode}')"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger py-0" onclick="deleteWeek(${w.id})"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`
  ).join('') || '<tr><td colspan="4" class="text-muted p-3">주차 없음</td></tr>';
}

async function addMember() {
  const body = { name: document.getElementById('m-name').value, baekjoon_handle: document.getElementById('m-handle').value };
  const res = await fetch(`/api/v1/sessions/${SESSION_ID}/members`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if (res.ok) { bootstrap.Modal.getInstance(document.getElementById('addMemberModal')).hide(); loadAll(); }
  else alert('추가 실패');
}

async function bulkAdd() {
  const lines = document.getElementById('bulk-text').value.trim().split('\n').filter(l => l.trim());
  const data = lines.map(l => { const [name, handle] = l.split(',').map(x => x.trim()); return {name, baekjoon_handle: handle}; });
  await fetch(`/api/v1/sessions/${SESSION_ID}/members/bulk`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
  bootstrap.Modal.getInstance(document.getElementById('bulkModal')).hide();
  loadAll();
}

async function deleteMember(id) {
  if (!confirm('멤버를 삭제하시겠습니까?')) return;
  await fetch(`/api/v1/members/${id}`, { method:'DELETE' });
  loadAll();
}

async function addWeek() {
  const body = {
    week_number: parseInt(document.getElementById('w-num').value),
    end_date: document.getElementById('w-end').value,
    min_gold_problems: parseInt(document.getElementById('w-gold').value),
    min_total_problems: parseInt(document.getElementById('w-total').value),
    criteria_mode: document.getElementById('w-mode').value,
  };
  const res = await fetch(`/api/v1/sessions/${SESSION_ID}/weeks`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if (res.ok) { bootstrap.Modal.getInstance(document.getElementById('addWeekModal')).hide(); loadAll(); }
  else alert('추가 실패');
}

async function deleteWeek(id) {
  if (!confirm('주차를 삭제하시겠습니까?')) return;
  await fetch(`/api/v1/weeks/${id}`, { method:'DELETE' });
  loadAll();
}

let editingWeekId = null;

function editWeek(id, weekNum, endDate, minGold, minTotal, mode) {
  editingWeekId = id;
  document.getElementById('ew-num').value = weekNum;
  document.getElementById('ew-end').value = endDate;
  document.getElementById('ew-gold').value = minGold;
  document.getElementById('ew-total').value = minTotal;
  document.getElementById('ew-mode').value = mode;
  new bootstrap.Modal(document.getElementById('editWeekModal')).show();
}

async function saveWeek() {
  const body = {
    week_number: parseInt(document.getElementById('ew-num').value),
    end_date: document.getElementById('ew-end').value,
    min_gold_problems: parseInt(document.getElementById('ew-gold').value),
    min_total_problems: parseInt(document.getElementById('ew-total').value),
    criteria_mode: document.getElementById('ew-mode').value,
  };
  const res = await fetch(`/api/v1/weeks/${editingWeekId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (res.ok) {
    bootstrap.Modal.getInstance(document.getElementById('editWeekModal')).hide();
    loadAll();
  } else {
    alert('수정 실패: ' + (await res.json()).detail);
  }
}

// ── 주차 가져오기 ─────────────────────────────────────────────────────────────

async function openImportModal() {
  // 현재 세션 제외한 전체 세션 목록 로드
  const res = await fetch('/api/v1/sessions');
  const sessions = await res.json();
  const others = sessions.filter(s => s.id !== SESSION_ID);

  const select = document.getElementById('import-session-select');
  select.innerHTML = '<option value="">— 세션을 선택하세요 —</option>' +
    others.map(s => `<option value="${s.id}">${s.name} (${s.type}, ${s.week_count}주차)</option>`).join('');

  document.getElementById('import-weeks-section').classList.add('d-none');
  document.getElementById('import-empty').classList.add('d-none');
  document.getElementById('import-btn').disabled = true;

  new bootstrap.Modal(document.getElementById('importModal')).show();
}

async function loadImportWeeks(sessionId) {
  const section = document.getElementById('import-weeks-section');
  const empty = document.getElementById('import-empty');
  const btn = document.getElementById('import-btn');
  section.classList.add('d-none');
  empty.classList.add('d-none');
  btn.disabled = true;

  if (!sessionId) return;

  const res = await fetch(`/api/v1/sessions/${sessionId}/weeks`);
  const weeks = await res.json();

  if (!weeks.length) {
    empty.classList.remove('d-none');
    return;
  }

  document.getElementById('import-week-list').innerHTML = weeks.map(w => `
    <div class="form-check py-1 border-bottom">
      <input class="form-check-input import-week-cb" type="checkbox" value="${w.id}" id="iw-${w.id}" checked>
      <label class="form-check-label" for="iw-${w.id}">
        <span class="fw-semibold">Week ${w.week_number}</span>
        <span class="text-muted ms-2 small">${w.end_date} · 골드≥${w.min_gold_problems} ${w.criteria_mode} 총≥${w.min_total_problems} · 문제 ${w.problems.length}개</span>
      </label>
    </div>`).join('');

  section.classList.remove('d-none');
  btn.disabled = false;
}

function toggleAllImport(checked) {
  document.querySelectorAll('.import-week-cb').forEach(cb => cb.checked = checked);
}

async function importWeeks() {
  const sourceSessionId = parseInt(document.getElementById('import-session-select').value);
  const weekIds = [...document.querySelectorAll('.import-week-cb:checked')].map(cb => parseInt(cb.value));

  if (!weekIds.length) { alert('가져올 주차를 하나 이상 선택하세요.'); return; }

  const btn = document.getElementById('import-btn');
  btn.disabled = true;
  btn.textContent = '가져오는 중...';

  const res = await fetch(`/api/v1/sessions/${SESSION_ID}/weeks/import`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ source_session_id: sourceSessionId, week_ids: weekIds }),
  });

  btn.disabled = false;
  btn.textContent = '가져오기';

  if (res.ok) {
    const imported = await res.json();
    bootstrap.Modal.getInstance(document.getElementById('importModal')).hide();
    loadAll();
    alert(`${imported.length}개 주차를 가져왔습니다.`);
  } else {
    alert('가져오기 실패: ' + (await res.json()).detail);
  }
}

loadAll();
</script>
{% endblock %}
