<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 — GPS 동아리</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
  <div class="card shadow-sm" style="width: 100%; max-width: 380px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-shield-lock fs-1 text-dark"></i>
        <h5 class="mt-2 mb-0 fw-bold">관리자 로그인</h5>
        <small class="text-muted">GPS 동아리 관리자</small>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2 small">
        <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
      </div>
      {% endif %}

      <form method="post" action="/admin/login">
        <div class="mb-3">
          <label class="form-label small fw-semibold">비밀번호</label>
          <input type="password" name="password" class="form-control"
                 placeholder="관리자 비밀번호 입력" autofocus required>
        </div>
        <button type="submit" class="btn btn-dark w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>로그인
        </button>
      </form>
    </div>
  </div>
</div>

</body>
</html>
