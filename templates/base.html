<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}GPS 동아리{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/base.css">
  {% block extra_css %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-code-slash me-1"></i>GPS
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="메뉴 열기">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center gap-lg-1">
        <li class="nav-item">
          <a class="nav-link" href="/">동아리 소개</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/attendance">출석 확인</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/recreation">레크리에이션</a>
        </li>
        {% if is_admin %}
          <li class="nav-item ms-lg-2">
            <a class="nav-link" href="/admin">관리자</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-sm btn-outline-light nav-link" href="/admin/logout">로그아웃</a>
          </li>
        {% else %}
          <li class="nav-item ms-lg-2">
            <a class="nav-link" href="/admin/login">관리자</a>
          </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
