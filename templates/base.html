<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BOJ 출석 체커{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/base.css">
  {% block extra_css %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-check2-circle me-1"></i>BOJ 출석 체커
    </a>
    <div class="navbar-nav ms-auto flex-row gap-2 align-items-center">
      <a class="nav-link" href="/">출석 확인</a>
      {% if is_admin %}
        <a class="nav-link" href="/admin">관리자</a>
        <a class="btn btn-sm btn-outline-light" href="/admin/logout">로그아웃</a>
      {% else %}
        <a class="nav-link" href="/admin/login">관리자</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container py-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
